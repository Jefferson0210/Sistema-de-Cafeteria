# Server (PORT lo inyectan muchas plataformas de despliegue)
server.port=${PORT:8080}


spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/gestion}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# JPA — el esquema lo gestiona Flyway; Hibernate solo valida (no modifica)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jackson.deserialization.FAIL_ON_UNKNOWN_PROPERTIES=true

# JWT
jwt.secret=${JWT_SECRET}
# Access token corto + refresh token largo (refresh opaco en BD, revocable)
app.jwt.access-ttl-minutes=15
app.jwt.refresh-ttl-days=7

# Rate limiting (en memoria, una instancia). Anti fuerza bruta en endpoints sensibles.
app.ratelimit.enabled=true
# Poner true SOLO en producción detrás de un proxy que sobrescriba X-Forwarded-For (si no, es spoofeable).
app.ratelimit.trust-forwarded-for=${RATELIMIT_TRUST_FORWARDED_FOR:false}
app.ratelimit.window-seconds=60
# login: por IP generoso (oficina tras una IP) + por email más estricto (ataque dirigido)
app.ratelimit.login.max=20
app.ratelimit.login.per-email-max=5
app.ratelimit.register.max=5
app.ratelimit.recuperar.max=5
app.ratelimit.recuperar.per-email-max=3
app.ratelimit.restablecer.max=10
app.ratelimit.reenviar.max=5
app.ratelimit.reenviar.per-email-max=3
app.ratelimit.verificar-email.max=10
app.ratelimit.refresh.max=30
# Chatbot: cada llamada a Gemini cuesta -> límite por usuario + por IP
app.ratelimit.chatbot.max=20
app.ratelimit.chatbot.per-user-max=10

# Limpieza de tokens caducados (job programado). Borra expiraEn < (ahora - grace-days).
app.token-cleanup.enabled=true
app.token-cleanup.cron=0 0 3 * * *
app.token-cleanup.grace-days=7

# Actuator: solo health por HTTP (whitelist); sin detalle de componentes (solo UP/DOWN).
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# El healthcheck refleja "app viva" + BD. El SMTP es best-effort: no debe tumbar health.
management.health.mail.enabled=false

# IVA por defecto (porcentaje) cuando no hay empresa asociada
app.iva.default-percent=15

# Pedido por QR: modo de cuenta por defecto al abrir sesión de mesa (COMUN | SEPARADA)
app.mesa.modo-por-defecto=SEPARADA

# URL del frontend (para enlaces en correos, p.ej. reset de contraseña)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Google OAuth
google.oauth.client-id=${GOOGLE_CLIENT_ID}

# Gemini (chatbot de reservas) — la key vive SOLO en el backend, nunca en el frontend
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.0-flash
gemini.timeout-ms=8000

# Upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Respuestas de error (ruta del contenedor, fuera de @RestControllerAdvice): nunca filtrar detalle
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# Logging
logging.level.root=INFO
logging.level.com.cafeteria.app=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%logger{36}] - %msg%n
# Log a archivo: se decide en el despliegue (logging.file.name) según dónde se aloje.

# CORS (or\u00c3\u00adgenes permitidos, separados por coma)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Email / SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8